name: build-and-package

on:
  workflow_dispatch:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build_toolchain:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          set -euxo pipefail
          docker build -f Dockerfile.builder -t riscv-gcc-builder-full .

      - name: Build toolchain in container
        run: |
          set -euxo pipefail
          mkdir -p out
          docker run --rm \
            -e JOBS_STAGE1=32 \
            -e JOBS_FINAL=32 \
            -e MAKE_RETRIES=6 \
            -e MAKE_RETRY_DELAY=8 \
            -v "${{ github.workspace }}:/work" \
            -v "${{ github.workspace }}/out:/out" \
            riscv-gcc-builder-full \
            /bin/bash -lc "bash /work/build.sh"

      - name: Verify toolchain files
        run: |
          set -euxo pipefail
          test -f out/riscv/bin/riscv32-unknown-elf-gcc.exe
          test -f out/riscv/bin/riscv32-unknown-elf-g++.exe
          test -f out/riscv/bin/riscv32-unknown-elf-gdb.exe
          test -f out/riscv/bin/riscv32-unknown-elf-readelf.exe
          test -f out/riscv/bin/libstdc++-6.dll
          test -f out/riscv/bin/libgcc_s_seh-1.dll
          test -f out/riscv/libexec/gcc/riscv32-unknown-elf/15.2.0/cc1.exe
          test -f out/riscv/libexec/gcc/riscv32-unknown-elf/15.2.0/cc1plus.exe
          test -f out/riscv/riscv32-unknown-elf/lib/libc_nano.a
          test -f out/riscv/riscv32-unknown-elf/lib/libm_nano.a
          test -f out/riscv/riscv32-unknown-elf/lib/libgloss_nano.a
          test -f out/riscv/riscv32-unknown-elf/lib/rv32imafc_zicsr_zaamo_zalrsc/ilp32f/libc_nano.a
          test -f out/riscv/riscv32-unknown-elf/lib/rv32imafc_zicsr_zaamo_zalrsc/ilp32f/libm_nano.a
          test -f out/riscv/riscv32-unknown-elf/lib/rv32imafc_zicsr_zaamo_zalrsc/ilp32f/libgloss_nano.a

      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: riscv-toolchain-dir
          path: out/riscv
          if-no-files-found: error
          compression-level: 0

  build_installer:
    needs: build_toolchain
    runs-on: windows-latest
    timeout-minutes: 240
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download toolchain artifact
        uses: actions/download-artifact@v4
        with:
          name: riscv-toolchain-dir
          path: out/riscv

      - name: Verify downloaded toolchain files
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $required = @(
            "out\\riscv\\bin\\riscv32-unknown-elf-gcc.exe",
            "out\\riscv\\bin\\riscv32-unknown-elf-g++.exe",
            "out\\riscv\\bin\\riscv32-unknown-elf-gdb.exe",
            "out\\riscv\\bin\\riscv32-unknown-elf-readelf.exe",
            "out\\riscv\\bin\\libstdc++-6.dll",
            "out\\riscv\\bin\\libgcc_s_seh-1.dll",
            "out\\riscv\\libexec\\gcc\\riscv32-unknown-elf\\15.2.0\\cc1.exe",
            "out\\riscv\\libexec\\gcc\\riscv32-unknown-elf\\15.2.0\\cc1plus.exe",
            "out\\riscv\\riscv32-unknown-elf\\lib\\libc_nano.a",
            "out\\riscv\\riscv32-unknown-elf\\lib\\libm_nano.a",
            "out\\riscv\\riscv32-unknown-elf\\lib\\libgloss_nano.a",
            "out\\riscv\\riscv32-unknown-elf\\lib\\rv32imafc_zicsr_zaamo_zalrsc\\ilp32f\\libc_nano.a",
            "out\\riscv\\riscv32-unknown-elf\\lib\\rv32imafc_zicsr_zaamo_zalrsc\\ilp32f\\libm_nano.a",
            "out\\riscv\\riscv32-unknown-elf\\lib\\rv32imafc_zicsr_zaamo_zalrsc\\ilp32f\\libgloss_nano.a"
          )
          foreach ($path in $required) {
            if (!(Test-Path $path)) {
              throw "Missing downloaded toolchain file: $path"
            }
          }

      - name: Build installer exe
        shell: powershell
        run: |
          .\build-installer.ps1

      - name: Smoke test installer
        shell: powershell
        run: |
          .\test-installer.ps1 -SourceDir (Join-Path $pwd 'out\riscv')

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: riscv-toolchain-installer
          path: out/installer/riscv-toolchain-installer.exe
          if-no-files-found: error

      - name: Install 7-Zip
        shell: powershell
        run: |
          choco install 7zip -y --no-progress

      - name: Build single-file full installer (SFX EXE)
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = Join-Path $pwd "out\release"
          $bundleDir = Join-Path $pwd "out\bundle"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null

          $installCmd = Join-Path $bundleDir "install.cmd"
          @'
          @echo off
          setlocal
          for %%I in ("%~dp0..") do set "ROOT=%%~fI\"
          "%ROOT%installer\riscv-toolchain-installer.exe" --source "%ROOT%riscv" %*
          exit /b %ERRORLEVEL%
          '@ | Set-Content -Path $installCmd -Encoding Ascii

          $cfg = Join-Path $bundleDir "sfx-config.txt"
          $cfgLines = @(
            ';!@Install@!UTF-8!',
            'Title="RISC-V Toolchain Installer"',
            'GUIMode="2"',
            'RunProgram="cmd /c %%T\\bundle\\install.cmd"',
            ';!@InstallEnd@!'
          )
          Set-Content -Path $cfg -Encoding Ascii -Value $cfgLines

          $archive = Join-Path $bundleDir "payload.7z"
          if (Test-Path $archive) { Remove-Item -Force $archive }

          Push-Location out
          & "$env:ProgramFiles\7-Zip\7z.exe" a -t7z -mx=9 -ms=off -snh- "$archive" "riscv\*" "installer\riscv-toolchain-installer.exe" "bundle\install.cmd"
          if ($LASTEXITCODE -ne 0) {
            throw "7z archive failed with rc=$LASTEXITCODE"
          }
          Pop-Location

          $sfx = Join-Path $env:ProgramFiles "7-Zip\7z.sfx"
          if (!(Test-Path $sfx)) {
            throw "Missing SFX module: $sfx"
          }

          $fullExe = Join-Path $releaseDir "riscv-toolchain-full-installer.exe"
          if (Test-Path $fullExe) { Remove-Item -Force $fullExe }

          $parts = @($sfx, $cfg, $archive)
          $outStream = [System.IO.File]::Open($fullExe, [System.IO.FileMode]::CreateNew, [System.IO.FileAccess]::Write, [System.IO.FileShare]::None)
          try {
            foreach ($part in $parts) {
              $inStream = [System.IO.File]::Open($part, [System.IO.FileMode]::Open, [System.IO.FileAccess]::Read, [System.IO.FileShare]::Read)
              try {
                $inStream.CopyTo($outStream)
              } finally {
                $inStream.Dispose()
              }
            }
          } finally {
            $outStream.Dispose()
          }

          if (!(Test-Path $fullExe)) {
            throw "SFX combine did not create output: $fullExe"
          }

          Get-Item $fullExe | Select-Object FullName, Length | Format-Table -AutoSize

      - name: Smoke test full installer exe
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $fullExe = Join-Path $pwd "out\release\riscv-toolchain-full-installer.exe"
          if (!(Test-Path $fullExe)) {
            throw "Missing full installer: $fullExe"
          }
          $sevenZip = Join-Path $env:ProgramFiles "7-Zip\7z.exe"
          if (!(Test-Path $sevenZip)) {
            throw "Missing 7-Zip executable: $sevenZip"
          }

          $installDir = Join-Path $pwd "out\full-install-test"
          $extractDir = Join-Path $pwd "out\full-extract-test"
          if (Test-Path $installDir) {
            Remove-Item -Recurse -Force $installDir
          }
          if (Test-Path $extractDir) {
            Remove-Item -Recurse -Force $extractDir
          }

          Write-Host "Using extractor: $sevenZip"
          Write-Host "Full installer: $fullExe"
          Write-Host "Extract dir: $extractDir"
          & $sevenZip x -y "-o$extractDir" $fullExe
          $extractRc = if ($null -eq $LASTEXITCODE) { -99999 } else { [int]$LASTEXITCODE }
          if ($extractRc -ne 0) {
            throw "Full installer extraction via 7z failed with rc=$extractRc"
          }

          $extractedInstaller = Join-Path $extractDir "installer\riscv-toolchain-installer.exe"
          $extractedSource = Join-Path $extractDir "riscv"
          $requiredInExtract = @(
            (Join-Path $extractedSource "bin\riscv32-unknown-elf-gcc.exe"),
            (Join-Path $extractedSource "bin\riscv32-unknown-elf-g++.exe"),
            (Join-Path $extractedSource "bin\riscv32-unknown-elf-gdb.exe"),
            (Join-Path $extractedSource "bin\riscv32-unknown-elf-readelf.exe"),
            (Join-Path $extractedSource "bin\libstdc++-6.dll"),
            (Join-Path $extractedSource "bin\libgcc_s_seh-1.dll"),
            (Join-Path $extractedSource "libexec\gcc\riscv32-unknown-elf\15.2.0\cc1.exe"),
            (Join-Path $extractedSource "libexec\gcc\riscv32-unknown-elf\15.2.0\cc1plus.exe"),
            (Join-Path $extractedSource "riscv32-unknown-elf\include\stdio.h"),
            (Join-Path $extractedSource "riscv32-unknown-elf\lib\libstdc++.a"),
            (Join-Path $extractedSource "riscv32-unknown-elf\lib\libc_nano.a"),
            (Join-Path $extractedSource "riscv32-unknown-elf\lib\libm_nano.a"),
            (Join-Path $extractedSource "riscv32-unknown-elf\lib\libgloss_nano.a"),
            (Join-Path $extractedSource "riscv32-unknown-elf\lib\rv32imafc_zicsr_zaamo_zalrsc\ilp32f\libc_nano.a"),
            (Join-Path $extractedSource "riscv32-unknown-elf\lib\rv32imafc_zicsr_zaamo_zalrsc\ilp32f\libm_nano.a"),
            (Join-Path $extractedSource "riscv32-unknown-elf\lib\rv32imafc_zicsr_zaamo_zalrsc\ilp32f\libgloss_nano.a")
          )
          $waitSeconds = 300
          for ($i = 0; $i -lt $waitSeconds; $i++) {
            $ready = (Test-Path $extractedInstaller)
            if ($ready) {
              foreach ($path in $requiredInExtract) {
                if (!(Test-Path $path)) {
                  $ready = $false
                  break
                }
              }
            }
            if ($ready) {
              break
            }
            Start-Sleep -Seconds 1
          }
          if (!(Test-Path $extractedInstaller)) {
            throw "Extracted installer missing: $extractedInstaller"
          }
          foreach ($path in $requiredInExtract) {
            if (!(Test-Path $path)) {
              throw "Extracted toolchain missing file: $path"
            }
          }

          & $extractedInstaller --silent --source $extractedSource --target $installDir --no-path
          if ($LASTEXITCODE -ne 0) {
            throw "Extracted installer execution failed with rc=$LASTEXITCODE"
          }

          $gccInInstall = Join-Path $installDir "bin\riscv32-unknown-elf-gcc.exe"
          $waitSeconds = 180
          for ($i = 0; $i -lt $waitSeconds; $i++) {
            if (Test-Path $gccInInstall) {
              break
            }
            Start-Sleep -Seconds 1
          }

          $required = @(
            $gccInInstall,
            (Join-Path $installDir "bin\riscv32-unknown-elf-g++.exe"),
            (Join-Path $installDir "bin\riscv32-unknown-elf-gdb.exe"),
            (Join-Path $installDir "bin\riscv32-unknown-elf-readelf.exe"),
            (Join-Path $installDir "bin\libstdc++-6.dll"),
            (Join-Path $installDir "bin\libgcc_s_seh-1.dll"),
            (Join-Path $installDir "libexec\gcc\riscv32-unknown-elf\15.2.0\cc1.exe"),
            (Join-Path $installDir "libexec\gcc\riscv32-unknown-elf\15.2.0\cc1plus.exe"),
            (Join-Path $installDir "riscv32-unknown-elf\include\stdio.h"),
            (Join-Path $installDir "riscv32-unknown-elf\lib\libstdc++.a"),
            (Join-Path $installDir "riscv32-unknown-elf\lib\libc_nano.a"),
            (Join-Path $installDir "riscv32-unknown-elf\lib\libm_nano.a"),
            (Join-Path $installDir "riscv32-unknown-elf\lib\libgloss_nano.a"),
            (Join-Path $installDir "riscv32-unknown-elf\lib\rv32imafc_zicsr_zaamo_zalrsc\ilp32f\libc_nano.a"),
            (Join-Path $installDir "riscv32-unknown-elf\lib\rv32imafc_zicsr_zaamo_zalrsc\ilp32f\libm_nano.a"),
            (Join-Path $installDir "riscv32-unknown-elf\lib\rv32imafc_zicsr_zaamo_zalrsc\ilp32f\libgloss_nano.a")
          )
          foreach ($path in $required) {
            if (!(Test-Path $path)) {
              throw "Missing installed file from full installer: $path"
            }
          }

          & (Join-Path $installDir "bin\riscv32-unknown-elf-gcc.exe") --version | Select-Object -First 1
          if ($LASTEXITCODE -ne 0) {
            throw "full installer gcc --version failed"
          }
          & (Join-Path $installDir "bin\riscv32-unknown-elf-gdb.exe") --version | Select-Object -First 1
          if ($LASTEXITCODE -ne 0) {
            throw "full installer gdb --version failed"
          }

          $helloC = Join-Path $installDir "hello-full.c"
          $helloElf = Join-Path $installDir "hello-full.elf"
          Set-Content -Path $helloC -Value "int main(void){return 0;}" -NoNewline -Encoding Ascii

          & (Join-Path $installDir "bin\riscv32-unknown-elf-gcc.exe") -march=rv32imac -mabi=ilp32 -Os $helloC -o $helloElf
          if ($LASTEXITCODE -ne 0) {
            throw "full installer hello compile failed"
          }

          $helloCpp = Join-Path $installDir "hello-full.cpp"
          $helloCppElf = Join-Path $installDir "hello-full-cpp.elf"
          Set-Content -Path $helloCpp -Value "int main(){return 0;}" -NoNewline -Encoding Ascii

          & (Join-Path $installDir "bin\riscv32-unknown-elf-g++.exe") -march=rv32imac -mabi=ilp32 -Os $helloCpp -o $helloCppElf
          if ($LASTEXITCODE -ne 0) {
            throw "full installer c++ hello compile failed"
          }

          $softFloatC = Join-Path $installDir "softfloat-full.c"
          $softFloatElf = Join-Path $installDir "softfloat-full-imac.elf"
          $softFloatSource = @'
          volatile float a = 3.5f;
          volatile float b = 1.25f;
          volatile int si = -7;
          volatile unsigned int ui = 9u;

          float fm(void) { return a * b; }
          float fd(void) { return a / b; }
          float fi(void) { return (float)si; }
          float fu(void) { return (float)ui; }

          int main(void) { return (int)(fm() + fd() + fi() + fu()); }
          '@
          Set-Content -Path $softFloatC -Value $softFloatSource -Encoding Ascii

          & (Join-Path $installDir "bin\riscv32-unknown-elf-gcc.exe") -march=rv32imac -mabi=ilp32 -Os $softFloatC -o $softFloatElf
          if ($LASTEXITCODE -ne 0) {
            throw "full installer soft-float helper compile failed for rv32imac/ilp32"
          }

          $helloNanoImacElf = Join-Path $installDir "hello-full-nano-imac.elf"
          & (Join-Path $installDir "bin\riscv32-unknown-elf-gcc.exe") -march=rv32imac -mabi=ilp32 --specs=nano.specs -Os $helloC -o $helloNanoImacElf
          if ($LASTEXITCODE -ne 0) {
            throw "full installer nano hello compile failed for rv32imac/ilp32"
          }

          $helloNanoImafcElf = Join-Path $installDir "hello-full-nano-imafc.elf"
          & (Join-Path $installDir "bin\riscv32-unknown-elf-gcc.exe") -march=rv32imafc -mabi=ilp32f --specs=nano.specs -Os $helloC -o $helloNanoImafcElf
          if ($LASTEXITCODE -ne 0) {
            throw "full installer nano hello compile failed for rv32imafc/ilp32f"
          }

          $helloCppNanoElf = Join-Path $installDir "hello-full-cpp-nano.elf"
          & (Join-Path $installDir "bin\riscv32-unknown-elf-g++.exe") -march=rv32imac -mabi=ilp32 --specs=nano.specs -Os $helloCpp -o $helloCppNanoElf
          if ($LASTEXITCODE -ne 0) {
            throw "full installer c++ nano hello compile failed"
          }

          $elfHeader = & (Join-Path $installDir "bin\riscv32-unknown-elf-readelf.exe") -h $helloElf
          if ($LASTEXITCODE -ne 0) {
            throw "full installer readelf failed"
          }

          $classLine = $elfHeader | Select-String -SimpleMatch "Class:"
          $machineLine = $elfHeader | Select-String -SimpleMatch "Machine:"
          if (-not $classLine) {
            throw "readelf output missing Class line"
          }
          if (-not $machineLine) {
            throw "readelf output missing Machine line"
          }

          Write-Host "    $($classLine.Line)"
          Write-Host "    $($machineLine.Line)"

      - name: Upload full installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: riscv-toolchain-full-installer-exe
          path: out/release/riscv-toolchain-full-installer.exe
          if-no-files-found: error
          compression-level: 0

      - name: Publish GitHub release (one EXE per push)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: push-${{ github.sha }}
          name: push-${{ github.sha }}
          target_commitish: ${{ github.sha }}
          files: out/release/riscv-toolchain-full-installer.exe
          fail_on_unmatched_files: true
